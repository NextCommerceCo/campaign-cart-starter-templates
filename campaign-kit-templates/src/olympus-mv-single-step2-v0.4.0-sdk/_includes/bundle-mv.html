<div class="checkout-selectors">
  <div class="form-section form-section--first">
    <h2 class="form-section__title">Choose your package</h2>
    <div
      class="os-cards__grid os--three"
      data-next-selector-id="main"
      data-next-bundle-selector
      data-next-selection-mode="swap"
      data-next-bundle-template-id="mv-bundle-template"
      data-next-bundle-slot-template-id="mv-slot-template"
      data-next-bundles='[
        {
          "id": "basic-set",
          "shippingId": "2",
          "title": "1x Unit",
          "subtitle": "Next Commerce Shirts",
          "items": [{"packageId":1,"quantity":1,"configurable":true}],
          "vouchers": [],
          "selected": true
        },
        {
          "id": "duo-set",
          "shippingId": "2",
          "title": "2x Unit",
          "subtitle": "Next Commerce Shirts",
          "badge": "Most Popular",
          "badgeClass": "os-card__label--pill-primary",
          "items": [{"packageId":1,"quantity":2,"configurable":true}],
          "vouchers": []
        },
        {
          "id": "spacial-set",
          "shippingId": "2",
          "title": "3x Unit",
          "subtitle": "Next Commerce Shirts",
          "badge": "Best Deal",
          "badgeClass": "os-card__label--pill-secondary",
          "items": [{"packageId":1,"quantity":3,"configurable":true}],
          "vouchers": []
        }
      ]'
      class="os-option"
    ></div>
    <template id="mv-bundle-template">
      <div
        data-next-bundle-card
        data-next-bundle-id="{bundle.id}"
        role="button"
        class="os-card"
      >
        <div class="os-card__header-slot">
          <div os-label-position="top-right" data-badge="{bundle.badge}" class="os-card__label-2 os-card__label--middle-center {bundle.badgeClass}">
            <div class="card-icons"><svg width="100%" height="100%" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M6.49512 0.5L8.40542 4.37069L12.677 4.99139L9.58605 8.00431L10.3157 12.2586L6.49512 10.25L2.67451 12.2586L3.40418 8.00431L0.31325 4.99139L4.58482 4.37069L6.49512 0.5Z" fill="#FF9425"></path>
            </svg></div>
            <div class="os-card__label-text-2">{bundle.badge}</div>
          </div>
        </div>
        <div class="os-card__wrapper cc-sm">
          <div class="os-card__content os-wrap">
            <div class="os-card__radio">
              <div data-selected="true" class="radio-style-1">
                <div class="radio-inner"></div>
              </div>
            </div>
            <div class="os-card__main-slot">
              <div class="os-card__title-section">
                <div class="os-card__title-wrapper">
                  <div
                    data-next-display="package.name"
                    class="os-card__title-2 os-bold"
                  >
                    {bundle.title}
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div os-slot="bottom" class="os-card__bottom-slot cc-gap">
            <div class="card-sup">{bundle.subtitle}</div>
            <div class="os-card__subtitle-text-2">
              Save
              <span data-next-bundle-price="savingsPercentage">XX%</span> OFF
            </div>
          </div>
        </div>
        <div os-slot="footer" class="os-card__footer-slot"></div>
        <div class="os-slots bundle-slots-source" style="display: none">
          <div data-next-bundle-slots></div>
        </div>
      </div>
    </template>
    <template id="mv-slot-template">
      <div class="next-slot">
        <div class="next-slot__step">
          <div># {slot.unitNumber}</div>
        </div>
        <div class="slot__right">
          <div class="step__wrap">
            <div class="next-slot__image">
              <img loading="lazy" alt="" src="{item.image}" />
            </div>
            <div class="os-card__pricing">
              <div class="os-card__price-container os--stacked">
                <div class="os-card__price diagonal-strike">
                  {item.originalUnitPrice}
                </div>
                <div class="os-card__price os--current">
                  {item.unitPrice}/ea
                </div>
                <div class="os-card__subtitle-text-2 {item.hasDiscount}">
                  Save <span>{item.discountPercentage}</span> OFF
                </div>
              </div>
            </div>
          </div>
          <div class="os-slot__selection cc-big">
            <div class="os-card__variant-options">
              <div class="os-card__variant-grid cc-horiz">
                <div data-next-variant-selectors></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </template>
  </div>
  <div class="form-section form-section--first">
    <h2 class="form-section__title">Select your color and size</h2>
    <div
      id="bundle-slots-stage"
      class="os-slots"
      data-next-bundle-slots-for="main"
    ></div>
  </div>
  <div class="form-section form-section--first">

  </div>
