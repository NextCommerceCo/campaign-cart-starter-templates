<!-- Prepurchase upsell: toggle-switch bump (static) -->
<div class="bump" data-next-await>
  <div
    class="bump-card"
    data-next-package-toggle
    data-next-package-id="3"
    data-next-is-upsell="true"
  >
    <div class="bump-header">
      <span class="bump-title">Shipping Insurance &amp; Loss Prevention</span>
      <span class="bump-switch" aria-hidden="true">
        <span class="bump-switch-knob"></span>
      </span>
    </div>
    <div class="bump-body">
      <p class="bump-description">
        Total shipping coverage and extended warranty. Breakage, loss, delays,
        porch pirates — even defects. 100% protected for just
        <span
          data-next-toggle-display="originalPrice"
          data-next-show="originalPrice != price"
          class="diagonal-strike"
        ></span>
        <span data-next-toggle-display="price"></span>
      </p>
    </div>
  </div>
</div>
