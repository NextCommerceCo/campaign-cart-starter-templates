<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{{ title }}</title>
    <meta content="{{ title }}" property="og:title">
    <meta content="{{ title }}" property="twitter:title">
    <meta content="width=device-width, initial-scale=1" name="viewport">

    <link rel="dns-prefetch" href="//campaigns.apps.29next.com">
    <link rel="dns-prefetch" href="//cdn-countries.muddy-wind-c7ca.workers.dev">
    <link rel="dns-prefetch" href="//cdn.jsdelivr.net">

    <!-- Campaign Configuration -->
    <script src="{{ 'config.js' | campaign_asset }}"></script>

    <!-- NEXT Metatags -->
    <meta name="next-funnel" content="{{ campaign.name }}">
    {% if next_success_url %}<meta name="next-success-url" content="{{ next_success_url | campaign_link }}">{% endif %}
    {% if next_upsell_accept %}<meta name="next-upsell-accept-url" content="{{ next_upsell_accept | campaign_link }}">{% endif %}
    {% if next_upsell_decline %}<meta name="next-upsell-decline-url" content="{{ next_upsell_decline | campaign_link }}">{% endif %}
    <meta name="next-page-type" content="{{ page_type }}">

    <!-- Campaign Cart SDK -->
    <script src="https://cdn.jsdelivr.net/gh/NextCommerceCo/campaign-cart@v{{ campaign.sdk_version }}/dist/loader.js" type="module"></script>

    <link href="{{ 'css/next-core.css' | campaign_asset }}" rel="stylesheet" type="text/css">
    {% for style in styles %}
    <link href="{{ style | campaign_asset }}" rel="stylesheet" type="text/css">
    {% endfor %}

    <link href="{{ 'images/favicon.png' | campaign_asset }}" rel="shortcut icon" type="image/x-icon">
    <link href="{{ 'images/webclip.png' | campaign_asset }}" rel="apple-touch-icon">

    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  </head>
  <body>
    {{ content }}
    {% for script in scripts %}
    <script defer src="{{ script | campaign_asset }}"></script>
    {% endfor %}
  </body>
</html>
